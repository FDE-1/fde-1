name: Generate Pac-Man

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Generate Pac-Man SVG
        run: |
          npm install -g pacman-contribution-graph
          mkdir -p dist
          pacman-contribution-graph --username FDE-1 --platform github --gameTheme github --output dist/pacman-light.svg
          pacman-contribution-graph --username FDE-1 --platform github --gameTheme github-dark --output dist/pacman-dark.svg

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}