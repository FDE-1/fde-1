name: Update README with latest GitHub activity

on:
  schedule:
    # Runs every 6 hours  (cron UTC)
    - cron: "0 */12 * * *"
  workflow_dispatch:       
  push:
    branches: [main]        

permissions:
  contents: write           

jobs:
  update-readme:
    name: Fetch activity and patch README
    runs-on: ubuntu-latest
    environment: GH_TOKEN

    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run activity_update.py
        env:
          GH_TOKEN:        ${{ secrets.GH_TOKEN }}
          GITHUB_USERNAME: ${{ vars.USERNAME }}  
          README_PATH:     README.md
          MAX_EVENTS:      "5"
        run: python activity_update.py

      - name: Commit updated README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          # Only commit when there's actually a change
          git diff --cached --quiet || git commit -m "chore: update GitHub activity [skip ci]"
          git push