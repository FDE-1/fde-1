name: Update README activity

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Update activity section
    permissions:
      contents: write

    steps:
      - name: Checkout repo              # ← this MUST come first
        uses: actions/checkout@v4

      - name: GitHub Activity Readme
        uses: jamesgeorge007/github-activity-readme@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          COMMIT_MSG: "chore: update README with recent activity"
          MAX_LINES: 5
          # TARGET_FILE defaults to README.md — only add this if yours is named differently